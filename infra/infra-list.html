<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基础设施组件清单</title>
<style>
  :root {
    --bg:        #f5f6f0;
    --surface:   #ffffff;
    --surface2:  #f0f1eb;
    --border:    #ddddd5;
    --border2:   #c8c9c0;
    --text:      #2c2c28;
    --muted:     #6b6b65;
    --hint:      #9e9e97;
    --accent:    #2d8c5e;
    --accent-bg: #e6f4ed;
    --warn:      #c97c10;
    --warn-bg:   #fef4e0;
    --danger:    #c23b3b;
    --mono:      'JetBrains Mono', 'Cascadia Code', 'Fira Mono', 'Courier New', monospace;
    --radius:    8px;
    --radius-lg: 12px;
  }
  body.dark {
    --bg:        #1c1e1a;
    --surface:   #242620;
    --surface2:  #2c2e28;
    --border:    #3a3d35;
    --border2:   #4a4d44;
    --text:      #e8e8e0;
    --muted:     #a0a098;
    --hint:      #686860;
    --accent:    #4ab87a;
    --accent-bg: #1a3326;
    --warn:      #e8a030;
    --warn-bg:   #332610;
  }
  body.eyecare {
    --bg:        #f4f0e4;
    --surface:   #faf7ee;
    --surface2:  #ede9db;
    --border:    #d5d0c0;
    --border2:   #c0bb9f;
    --text:      #3a3525;
    --muted:     #7a7360;
    --hint:      #a09880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  body { background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; transition: background .2s, color .2s; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; gap: 12px; height: 52px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .topbar-title { font-size: 15px; font-weight: 600; white-space: nowrap; color: var(--text); }
  .topbar-title span { color: var(--accent); }
  .topbar-spacer { flex: 1; }

  /* Search */
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap input {
    height: 34px; padding: 0 32px 0 32px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text); font-size: 13px;
    width: 220px; outline: none;
    transition: border-color .15s, width .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); width: 280px; }
  .search-wrap .ico-search {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    color: var(--hint); font-size: 14px; pointer-events: none;
  }
  .search-wrap .btn-clear {
    position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--hint); color: var(--surface);
    border: none; cursor: pointer; font-size: 11px; line-height: 18px; text-align: center;
    display: none; padding: 0;
  }
  .search-wrap input:not(:placeholder-shown) ~ .btn-clear { display: block; }

  /* Theme toggles */
  .theme-group { display: flex; gap: 4px; }
  .theme-btn {
    height: 30px; padding: 0 10px; font-size: 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2); color: var(--muted);
    cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .theme-btn:hover, .theme-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  .add-btn {
    height: 34px; padding: 0 14px; font-size: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; white-space: nowrap; font-weight: 500;
    transition: opacity .15s;
  }
  .add-btn:hover { opacity: .88; }

  .export-btn {
    height: 34px; padding: 0 14px; font-size: 13px;
    background: var(--warn); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; white-space: nowrap; font-weight: 500;
    transition: opacity .15s;
  }
  .export-btn:hover { opacity: .88; }

  /* ── Filter bar ── */
  .filterbar {
    position: sticky; top: 52px; z-index: 40;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--hint); white-space: nowrap; }
  .ftag {
    font-size: 11px; padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .ftag.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ftag:hover:not(.active) { border-color: var(--border2); color: var(--text); background: var(--surface2); }

  /* ── Stats ── */
  .stats-row {
    display: flex; gap: 10px; padding: 14px 20px 0;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 18px;
    display: flex; align-items: baseline; gap: 7px;
  }
  .stat-num { font-size: 22px; font-weight: 700; font-family: var(--mono); }
  .stat-lbl { font-size: 11px; color: var(--muted); }

  /* ── Table ── */
  .tbl-wrap {
    margin: 14px 20px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
  }
  table { width: 100%; border-collapse: collapse; table-layout: auto; }
  thead { background: var(--surface2); }
  th {
    padding: 10px 12px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-align: left; white-space: nowrap;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    letter-spacing: .04em;
  }
  th .si { opacity: .3; margin-left: 3px; }
  th.sorted .si { opacity: 1; color: var(--accent); }
  th:hover { color: var(--text); }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);  /* ✅ 每行都有分割线 */
    vertical-align: middle;
    font-size: 13px;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* Seq num */
  .seq { font-family: var(--mono); font-size: 11px; color: var(--hint); text-align: right; width: 36px; }

  /* Component name */
  .cname { font-weight: 600; font-size: 13px; color: var(--text); }

  /* Category chips */
  .cat-chip {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px; white-space: nowrap;
  }
  .c-container { background: #fde8e0; color: #8b3010; }
  .c-storage   { background: #e0f2ea; color: #1a6640; }
  .c-db        { background: #fce4f0; color: #8b2050; }
  .c-message   { background: #fef3d8; color: #8b5500; }
  .c-network   { background: #ddeeff; color: #1a4a88; }
  .c-runtime   { background: #eeebff; color: #4030a0; }
  .c-monitor   { background: #e8f4d8; color: #366010; }
  body.dark .c-container { background: #4a1808; color: #f5b090; }
  body.dark .c-storage   { background: #0c3a20; color: #7ddaa8; }
  body.dark .c-db        { background: #3a0c24; color: #f0a0c0; }
  body.dark .c-message   { background: #3a2200; color: #f0c060; }
  body.dark .c-network   { background: #0c2a50; color: #80b8f8; }
  body.dark .c-runtime   { background: #201448; color: #b0a0f8; }
  body.dark .c-monitor   { background: #1a3008; color: #a0d060; }
  body.eyecare .c-container { background: #f0d8cc; color: #6a2808; }
  body.eyecare .c-storage   { background: #d0e8d8; color: #1a5030; }

  /* Ports */
  .ports-cell { display: flex; flex-wrap: wrap; gap: 4px; }
  .port-tag {
    display: inline-flex; align-items: center;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    background: var(--accent-bg); color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 4px; padding: 2px 7px;
    cursor: pointer; transition: opacity .12s; white-space: nowrap;
    user-select: none;
  }
  .port-tag:hover { opacity: .75; }
  .port-tag.copied { background: var(--accent); color: #fff; }

  /* Version */
  .ver { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* Date */
  .date-cell { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Status */
  .status-wrap { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .d-ok   { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
  .d-warn { background: var(--warn);   box-shadow: 0 0 0 2px var(--warn-bg); }
  .d-off  { background: var(--hint); }
  .status-lbl { font-size: 12px; color: var(--muted); }

  /* Links */
  .links-cell { display: flex; flex-direction: column; gap: 2px; }
  .links-cell a {
    font-size: 12px; color: #2563eb; text-decoration: none; white-space: nowrap;
    display: flex; align-items: center; gap: 3px;
  }
  .links-cell a:hover { text-decoration: underline; }
  body.dark .links-cell a { color: #6aa8f8; }

  /* Note */
  .note-cell { font-size: 12px; color: var(--muted); max-width: 200px; word-break: break-all; }

  /* Action btns */
  .act-wrap { display: flex; gap: 5px; white-space: nowrap; }
  .act-btn {
    height: 26px; padding: 0 9px; font-size: 11px;
    border: 1px solid var(--border2);
    border-radius: 5px;
    background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all .12s;
  }
  .act-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }
  .act-btn.del:hover { color: var(--danger); border-color: var(--danger); background: #fff0f0; }

  .empty-row td { text-align: center; padding: 40px; color: var(--hint); font-size: 13px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.48);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px; width: 460px; max-width: 94vw;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-row label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; height: 34px; padding: 0 10px;
    border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--surface2); color: var(--text); font-size: 13px;
    outline: none; font-family: inherit; transition: border-color .15s;
  }
  .form-row textarea { height: 64px; padding: 8px 10px; resize: vertical; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel {
    height: 34px; padding: 0 14px; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); cursor: pointer; color: var(--text);
  }
  .btn-save {
    height: 34px; padding: 0 18px; font-size: 13px; font-weight: 500;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); cursor: pointer;
  }
  .btn-save:hover { opacity: .9; }

  /* ── Export Modal - Dual List ── */
  .export-lists-container {
    display: flex; gap: 16px; margin-bottom: 24px;
    height: 300px;
  }
  .export-list-container {
    flex: 1;
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .export-list-header {
    background: var(--surface2);
    padding: 6px 12px;
    font-size: 12px; font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-buttons {
    display: flex; gap: 4px;
  }
  .header-btn {
    font-size: 10px; padding: 2px 6px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer; transition: all .15s;
  }
  .header-btn:hover {
    background: var(--surface2);
    border-color: var(--border);
  }
  .export-list {
    flex: 1;
    overflow-y: auto;
    background: var(--surface);
  }
  .export-list-item {
    padding: 8px 12px;
    font-size: 12px; color: var(--text);
    cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background-color .15s;
    display: flex; align-items: center;
    gap: 8px;
  }
  .export-list-item:last-child { border-bottom: none; }
  .export-list-item:hover { background: var(--surface2); }
  .export-list-item.selected {
    background: var(--accent-bg);
    color: var(--accent);
    border-left: 3px solid var(--accent);
  }
  .export-list-item input[type="checkbox"] {
    margin: 0;
    flex-shrink: 0;
  }
  .export-list-item .col-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .export-list-item .col-key {
    font-size: 10px; color: var(--hint);
    flex-shrink: 0;
  }
  .export-list-buttons {
    display: flex; flex-direction: column;
    justify-content: center; gap: 8px;
    width: 50px; align-items: center;
  }
  .export-move-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .export-move-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .export-move-btn:disabled {
    opacity: 0.4; cursor: not-allowed;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: #222; color: #fff;
    padding: 8px 16px; border-radius: var(--radius);
    font-size: 12px; opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
<!-- SheetJS for Excel export -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">🖥 基础设施 <span>组件清单</span></div>
  <div class="topbar-spacer"></div>
  <div class="search-wrap">
    <span class="ico-search">🔍</span>
    <input type="text" id="search" placeholder="搜索组件、端口、备注…" oninput="render()">
    <button class="btn-clear" onclick="clearSearch()" title="清空">✕</button>
  </div>
  <div class="theme-group">
    <button class="theme-btn active" id="t-light" onclick="setTheme('light')">☀ 日间</button>
    <button class="theme-btn" id="t-eyecare" onclick="setTheme('eyecare')">🍃 护眼</button>
    <button class="theme-btn" id="t-dark" onclick="setTheme('dark')">🌙 夜间</button>
  </div>
  <button class="export-btn" onclick="openExportModal()">📤 导出</button>
  <button class="add-btn" onclick="openModal()">＋ 新增组件</button>
</div>

<!-- Filter bar -->
<div class="filterbar">
  <span class="filter-label">分类：</span>
  <div id="filterTags"></div>
</div>

<!-- Stats -->
<div class="stats-row" id="stats"></div>

<!-- Table -->
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th class="seq" title="序号">#</th>
        <th onclick="sortBy('name')">组件名称 <span class="si" id="si-name">↕</span></th>
        <th onclick="sortBy('category')">分类 <span class="si" id="si-category">↕</span></th>
        <th onclick="sortBy('version')">版本 <span class="si" id="si-version">↕</span></th>
        <th>端口</th>
        <th onclick="sortBy('updated')">更新日期 <span class="si" id="si-updated">↕</span></th>
        <th>状态</th>
        <th>相关链接</th>
        <th>备注</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">新增组件</h3>
    <div class="form-grid">
      <div class="form-row full"><label>组件名称 *</label><input id="f-name" placeholder="如 Redis"></div>
      <div class="form-row"><label>分类</label>
        <select id="f-category">
          <option value="storage">存储</option>
          <option value="db">数据库</option>
          <option value="message">消息队列</option>
          <option value="network">网络/代理</option>
          <option value="runtime">运行时</option>
          <option value="monitor">监控</option>
          <option value="container">容器编排</option>
        </select>
      </div>
      <div class="form-row"><label>版本</label><input id="f-version" placeholder="如 7.2.4"></div>
      <div class="form-row full"><label>端口（多个用逗号分隔）</label><input id="f-ports" placeholder="如 6379, 16379"></div>
      <div class="form-row"><label>更新日期</label><input id="f-updated" type="date"></div>
      <div class="form-row"><label>状态</label>
        <select id="f-status">
          <option value="ok">运行中</option>
          <option value="warn">告警</option>
          <option value="off">已停用</option>
        </select>
      </div>
      <div class="form-row full">
        <label>相关链接（格式：名称:URL，多个用逗号分隔）</label>
        <input id="f-links" placeholder="如 文档:https://redis.io, 控制台:http://192.168.1.1:8001">
      </div>
      <div class="form-row full"><label>备注</label><textarea id="f-note" placeholder="简短描述..."></textarea></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModalOverlay">
  <div class="modal" onclick="event.stopPropagation()" style="width: 700px;">
    <h3>导出选项</h3>
    <div style="margin-bottom: 16px; font-size: 12px; color: var(--muted);">选择导出列并调整顺序（默认导出全部列）</div>

    <div class="export-lists-container">
      <div class="export-list-container">
        <div class="export-list-header">
          <span>可用列</span>
          <div class="header-buttons">
            <button class="header-btn" onclick="selectAllAvailable()" title="全选">全选</button>
            <button class="header-btn" onclick="deselectAllAvailable()" title="全取消">全取消</button>
          </div>
        </div>
        <div class="export-list" id="availableColumns">
          <!-- Available columns will be populated here -->
        </div>
      </div>

      <div class="export-list-buttons">
        <button class="export-move-btn" onclick="moveToSelected()" title="添加到导出列">▶</button>
        <button class="export-move-btn" onclick="moveToAvailable()" title="移除出导出列">◀</button>
        <div style="height: 10px;"></div>
        <button class="export-move-btn" onclick="moveUpSelected()" title="上移">↑</button>
        <button class="export-move-btn" onclick="moveDownSelected()" title="下移">↓</button>
      </div>

      <div class="export-list-container">
        <div class="export-list-header">
          <span>导出列</span>
          <div class="header-buttons">
            <button class="header-btn" onclick="selectAllSelected()" title="全选">全选</button>
            <button class="header-btn" onclick="deselectAllSelected()" title="全取消">全取消</button>
          </div>
        </div>
        <div class="export-list" id="selectedColumns">
          <!-- Selected columns will be populated here -->
        </div>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeExportModal()">取消</button>
      <button class="btn-save" onclick="exportToExcel()">导出 Excel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  storage:   { label: '存储',     cls: 'c-storage' },
  db:        { label: '数据库',   cls: 'c-db' },
  message:   { label: '消息队列', cls: 'c-message' },
  network:   { label: '网络/代理',cls: 'c-network' },

let nextId = 20;
let sortKey = 'name', sortDir = 1;
let activeFilter = 'all';
let editId = null;

// Columns configuration for export
const columnDefs = [
  { key: 'seq', label: '序号', getter: (row, idx) => idx + 1 },
  { key: 'name', label: '组件名称', getter: (row) => row.name },
  { key: 'category', label: '分类', getter: (row) => (CATS[row.category] || { label: row.category }).label },
  { key: 'version', label: '版本', getter: (row) => row.version || '' },
  { key: 'ports', label: '端口', getter: (row) => row.ports || '' },
  { key: 'updated', label: '更新日期', getter: (row) => row.updated || '' },
  { key: 'status', label: '状态', getter: (row) => (STATUS[row.status] || STATUS.off).lbl },
  { key: 'links', label: '相关链接', getter: (row) => row.links || '' },
  { key: 'note', label: '备注', getter: (row) => row.note || '' },
  // Note: '操作' column is not exported
];

/* ── Theme ── */
function setTheme(t) {
  document.body.classList.remove('dark', 'eyecare');
  if (t === 'dark') document.body.classList.add('dark');
  if (t === 'eyecare') document.body.classList.add('eyecare');
  ['light','eyecare','dark'].forEach(k => {
    document.getElementById('t-'+k).classList.toggle('active', k === t);
  });
  localStorage.setItem('theme', t);
}
(function() { const t = localStorage.getItem('theme'); if (t) setTheme(t); })();

/* ── Search ── */
function clearSearch() {
  document.getElementById('search').value = '';
  render();
}

/* ── Sort ── */
function sortBy(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
  document.querySelectorAll('.si').forEach(el => { el.textContent = '↕'; el.style.color = ''; });
  const si = document.getElementById('si-' + k);
  if (si) { si.textContent = sortDir === 1 ? '↑' : '↓'; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  render();
}

/* ── Filter ── */
function setFilter(f) { activeFilter = f; render(); }

function getRows() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  return data.filter(d => {
    const catOk = activeFilter === 'all' || d.category === activeFilter;
    const qOk = !q || [d.name, d.ports, d.version, d.note, d.category, d.links]
      .some(v => (v||'').toLowerCase().includes(q));
    return catOk && qOk;
  }).sort((a, b) => {
    const av = (a[sortKey] || '').toString().toLowerCase();
    const bv = (b[sortKey] || '').toString().toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

/* ── Render stats ── */
function renderStats() {
  const ok = data.filter(d => d.status === 'ok').length;
  const warn = data.filter(d => d.status === 'warn').length;
  const cats = new Set(data.map(d => d.category)).size;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><span class="stat-num">${data.length}</span><span class="stat-lbl">组件总数</span></div>
    <div class="stat-card"><span class="stat-num" style="color:var(--accent)">${ok}</span><span class="stat-lbl">运行中</span></div>
    <div class="stat-card"><span class="stat-num" style="color:var(--warn)">${warn}</span><span class="stat-lbl">告警</span></div>
    <div class="stat-card"><span class="stat-num">${cats}</span><span class="stat-lbl">分类数</span></div>
  `;
}

/* ── Render filter tags ── */
function renderFilters() {
  const counts = {};
  data.forEach(d => counts[d.category] = (counts[d.category] || 0) + 1);
  let html = `<span class="ftag ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">全部 (${data.length})</span>`;
  Object.entries(CATS).forEach(([k, v]) => {
    if (counts[k]) html += `<span class="ftag ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${v.label} (${counts[k]})</span>`;
  });
  document.getElementById('filterTags').innerHTML = html;
}

/* ── Render table ── */
function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('tbody').innerHTML = '<tr class="empty-row"><td colspan="10">没有匹配的组件</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = rows.map((d, idx) => {
    const cat = CATS[d.category] || { label: d.category, cls: '' };
    const st  = STATUS[d.status] || STATUS.off;

    // Ports — 空则显示 —
    const portHtml = d.ports
      ? d.ports.split(',').map(p => p.trim()).filter(Boolean)
          .map(p => `<span class="port-tag" onclick="copyPort(this,'${p}')">${p}</span>`).join('')
      : '<span style="color:var(--hint);font-size:11px">—</span>';

    // Links parsing: support name:https://... (colon in URL)
    function parseLinks(raw) {
      if (!raw || !raw.trim()) return [];
      return raw.split(',').map(item => {
        item = item.trim();
        const colonIdx = item.indexOf(':');
        if (colonIdx === -1) return null;
        const name = item.slice(0, colonIdx).trim();
        const url  = item.slice(colonIdx + 1).trim();
        // if url starts with http or https, it's valid
        if (!url) return null;
        const fullUrl = url.startsWith('http') ? url : 'http://' + url;
        return { name: name || fullUrl, url: fullUrl };
      }).filter(Boolean);
    }
    const links = parseLinks(d.links);
    const linkHtml = links.length
      ? links.map(l => `<a href="${l.url}" target="_blank">🔗 ${l.name}</a>`).join('')
      : '<span style="color:var(--hint);font-size:11px">—</span>';

    return `<tr>
      <td class="seq">${idx + 1}</td>
      <td><span class="cname">${d.name}</span></td>
      <td><span class="cat-chip ${cat.cls}">${cat.label}</span></td>
      <td><span class="ver">${d.version || '—'}</span></td>
      <td><div class="ports-cell">${portHtml}</div></td>
      <td class="date-cell">${d.updated || '—'}</td>
      <td><div class="status-wrap"><span class="dot ${st.dot}"></span><span class="status-lbl">${st.lbl}</span></div></td>
      <td class="links-cell">${linkHtml}</td>
      <td class="note-cell">${d.note || ''}</td>
      <td><div class="act-wrap">
        <button class="act-btn" onclick="openModal(${d.id})">编辑</button>
        <button class="act-btn del" onclick="delItem(${d.id})">删除</button>
      </div></td>
    </tr>`;
  }).join('');
}

function render() { renderStats(); renderFilters(); renderTable(getRows()); }

/* ── Copy port ── */
function copyPort(el, port) {
  navigator.clipboard.writeText(port).then(() => {
    el.classList.add('copied');
    showToast('已复制端口：' + port);
    setTimeout(() => el.classList.remove('copied'), 1200);
  });
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ── Modal ── */
function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? '编辑组件' : '新增组件';
  const d = id ? (data.find(x => x.id === id) || {}) : {};
  document.getElementById('f-name').value     = d.name     || '';
  document.getElementById('f-category').value = d.category || 'storage';
  document.getElementById('f-version').value  = d.version  || '';
  document.getElementById('f-ports').value    = d.ports    || '';
  document.getElementById('f-updated').value  = d.updated  || new Date().toISOString().slice(0,10);
  document.getElementById('f-status').value   = d.status   || 'ok';
  document.getElementById('f-links').value    = d.links    || '';
  document.getElementById('f-note').value     = d.note     || '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('exportModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeExportModal();
});

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('组件名称不能为空'); return; }
  const obj = {
    name,
    category: document.getElementById('f-category').value,
    version:  document.getElementById('f-version').value.trim(),
    ports:    document.getElementById('f-ports').value.trim(),
    updated:  document.getElementById('f-updated').value,
    status:   document.getElementById('f-status').value,
    links:    document.getElementById('f-links').value.trim(),
    note:     document.getElementById('f-note').value.trim(),
  };
  if (editId) {
    const i = data.findIndex(x => x.id === editId);
    if (i > -1) data[i] = { ...data[i], ...obj };
  } else {
    data.push({ id: nextId++, ...obj });
  }
  closeModal();
  render();
  showToast(editId ? '已更新：' + name : '已新增：' + name);
}

function delItem(id) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  if (!confirm('确认删除「' + d.name + '」？')) return;
  data = data.filter(x => x.id !== id);
  render();
  showToast('已删除：' + d.name);
}

/* ── Export Modal ── */
function openExportModal() {
  const availableList = document.getElementById('availableColumns');
  const selectedList = document.getElementById('selectedColumns');

  // Clear lists
  availableList.innerHTML = '';
  selectedList.innerHTML = '';

  // By default, all columns are in available list (left side) with checkboxes
  columnDefs.forEach(col => {
    const item = createListItem(col, true); // Include checkbox for available list
    availableList.appendChild(item);
  });

  document.getElementById('exportModalOverlay').classList.add('open');
}

function closeExportModal() {
  document.getElementById('exportModalOverlay').classList.remove('open');
}

function createListItem(col, includeCheckbox = false) {
  const div = document.createElement('div');
  div.className = 'export-list-item';
  div.dataset.key = col.key;

  if (includeCheckbox) {
    div.innerHTML = `
      <input type="checkbox" class="export-checkbox">
      <span class="col-label">${col.label}</span>
      <span class="col-key">${col.key}</span>
    `;
  } else {
    div.innerHTML = `
      <span class="col-label">${col.label}</span>
      <span class="col-key">${col.key}</span>
    `;
  }

  div.addEventListener('click', function(e) {
    // If clicking on checkbox, don't toggle selection
    if (e.target.type === 'checkbox') return;
    if (e.target.tagName === 'BUTTON') return;

    // Toggle selection
    const isSelected = this.classList.contains('selected');
    document.querySelectorAll('.export-list-item.selected').forEach(el => {
      el.classList.remove('selected');
    });

    if (!isSelected) {
      this.classList.add('selected');
    }
  });

  // Store the checkbox reference if present
  if (includeCheckbox) {
    div.checkbox = div.querySelector('input[type="checkbox"]');
  }

  return div;
}

// Get the currently selected list item (if any)
function getSelectedItem() {
  return document.querySelector('.export-list-item.selected');
}

// Move items from available to selected list
function moveToSelected() {
  const availableList = document.getElementById('availableColumns');
  const selectedList = document.getElementById('selectedColumns');

  // Get all checked checkboxes in available list
  const checkedItems = Array.from(availableList.querySelectorAll('.export-list-item'))
    .filter(item => {
      const checkbox = item.querySelector('input[type="checkbox"]');
      return checkbox && checkbox.checked;
    });

  if (checkedItems.length === 0) {
    // If no checkboxes checked, try to move the highlighted item
    const selectedItem = getSelectedItem();
    if (!selectedItem || !availableList.contains(selectedItem)) {
      alert('请先在左边列表中选择要导出的列（勾选复选框或点击选中）。');
      return;
    }
    checkedItems.push(selectedItem);
  }

  // Move each checked item
  checkedItems.forEach(item => {
    const key = item.dataset.key;
    const col = columnDefs.find(c => c.key === key);
    if (!col) return;

    // Create new item with checkbox for selected list
    const newItem = createListItem(col, true);
    selectedList.appendChild(newItem);

    // Remove from available list
    item.remove();
  });
}

// Move items from selected to available list
function moveToAvailable() {
  const availableList = document.getElementById('availableColumns');
  const selectedList = document.getElementById('selectedColumns');

  // Get all checked checkboxes in selected list
  const checkedItems = Array.from(selectedList.querySelectorAll('.export-list-item'))
    .filter(item => {
      const checkbox = item.querySelector('input[type="checkbox"]');
      return checkbox && checkbox.checked;
    });

  if (checkedItems.length === 0) {
    // If no checkboxes checked, try to move the highlighted item
    const selectedItem = getSelectedItem();
    if (!selectedItem || !selectedList.contains(selectedItem)) {
      alert('请先在右边列表中选择要移除的列（勾选复选框或点击选中）。');
      return;
    }
    checkedItems.push(selectedItem);
  }

  // Move each checked item
  checkedItems.forEach(item => {
    const key = item.dataset.key;
    const col = columnDefs.find(c => c.key === key);
    if (!col) return;

    // Create new item with checkbox for available list
    const newItem = createListItem(col, true);
    availableList.appendChild(newItem);

    // Remove from selected list
    item.remove();
  });
}

// Move selected item up in the selected list
function moveUpSelected() {
  const selectedItem = getSelectedItem();
  if (!selectedItem) {
    alert('请先在右边列表中选择要移动的列。');
    return;
  }

  const selectedList = document.getElementById('selectedColumns');
  if (!selectedList.contains(selectedItem)) {
    alert('只能在导出列列表中调整顺序。');
    return;
  }

  const prevSibling = selectedItem.previousElementSibling;
  if (prevSibling) {
    selectedList.insertBefore(selectedItem, prevSibling);
  }
}

// Move selected item down in the selected list
function moveDownSelected() {
  const selectedItem = getSelectedItem();
  if (!selectedItem) {
    alert('请先在右边列表中选择要移动的列。');
    return;
  }

  const selectedList = document.getElementById('selectedColumns');
  if (!selectedList.contains(selectedItem)) {
    alert('只能在导出列列表中调整顺序。');
    return;
  }

  const nextSibling = selectedItem.nextElementSibling;
  if (nextSibling) {
    selectedList.insertBefore(nextSibling, selectedItem);
  }
}

// Select all checkboxes in available list
function selectAllAvailable() {
  const availableList = document.getElementById('availableColumns');
  const checkboxes = availableList.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => cb.checked = true);
}

// Deselect all checkboxes in available list
function deselectAllAvailable() {
  const availableList = document.getElementById('availableColumns');
  const checkboxes = availableList.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => cb.checked = false);
}

// Select all checkboxes in selected list
function selectAllSelected() {
  const selectedList = document.getElementById('selectedColumns');
  const checkboxes = selectedList.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => cb.checked = true);
}

// Deselect all checkboxes in selected list
function deselectAllSelected() {
  const selectedList = document.getElementById('selectedColumns');
  const checkboxes = selectedList.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => cb.checked = false);
}

function exportToExcel() {
  // Get columns from selected list (right side)
  const selectedList = document.getElementById('selectedColumns');
  const selectedItems = Array.from(selectedList.querySelectorAll('.export-list-item'));

  if (selectedItems.length === 0) {
    alert('请至少选择一列进行导出。');
    return;
  }

  // Get column definitions in the order they appear in the selected list
  const selectedCols = selectedItems.map(item => {
    const key = item.dataset.key;
    return columnDefs.find(col => col.key === key);
  }).filter(Boolean); // Filter out any undefined (should not happen)

  // Get filtered rows (respecting search and filter)
  const rows = getRows();

  // Prepare data array
  const dataArray = [];
  // Header row
  const headerRow = selectedCols.map(col => col.label);
  dataArray.push(headerRow);

  // Data rows
  rows.forEach((row, idx) => {
    const dataRow = selectedCols.map(col => col.getter(row, idx));
    dataArray.push(dataRow);
  });

  // Create worksheet
  const ws = XLSX.utils.aoa_to_sheet(dataArray);

  // Create workbook
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '组件清单');

  // Generate file and trigger download
  XLSX.writeFile(wb, '基础设施组件清单.xlsx');

  // Close modal
  closeExportModal();
  showToast('导出成功，文件已下载。');
}

/* ── Init ── */
render();
